# BrainPalace Monorepo Task Runner
# https://taskfile.dev
#
# Usage:
#   task --list          # List all available tasks
#   task install         # Install all packages
#   task build           # Build all packages
#   task test            # Run all tests
#   task before-push     # Run before pushing/PR

version: '3'

dotenv:
  - brainpalace-server/.env
  - brainpalace-server/.env.local

vars:
  SERVER_DIR: brainpalace-server
  CLI_DIR: brainpalace-cli
  # `poetry` wrapped to strip an IDE-injected VIRTUAL_ENV (e.g. the VSCode
  # Python extension exporting a non-project path), so Poetry always resolves
  # the per-package in-project .venv/. Use {{.POETRY}} for every Poetry call.
  POETRY: env -u VIRTUAL_ENV poetry

includes:
  server:
    taskfile: ./brainpalace-server/Taskfile.yml
    dir: ./brainpalace-server
  cli:
    taskfile: ./brainpalace-cli/Taskfile.yml
    dir: ./brainpalace-cli
  dashboard:
    taskfile: ./brainpalace-dashboard/Taskfile.yml
    dir: ./brainpalace-dashboard

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list

  # ===================
  # Setup & Installation
  # ===================

  install:
    desc: Install all package dependencies
    cmds:
      - task: server:install
      - task: cli:install
      - task: dashboard:install
      - task: install:dashboard-ui
      - task: install:hooks

  install:dashboard-ui:
    desc: >-
      Build the dashboard SPA into brainpalace_dashboard/static/ (gitignored
      generated output — not committed). Skips gracefully when npm is absent:
      the dashboard UI is then unavailable but the API/server are unaffected
      (the runtime no-ops the SPA mount when static/ is missing).
    dir: ./brainpalace-dashboard/frontend
    cmds:
      - cmd: |
          if command -v npm >/dev/null 2>&1; then
            npm ci && npm run build
          else
            echo "npm not found — skipping dashboard SPA build (UI unavailable; API/server unaffected)."
          fi

  install:hooks:
    desc: "Point git at the version-controlled hooks"
    cmds:
      - git config core.hooksPath scripts/githooks
      - chmod +x scripts/githooks/pre-commit

  install:server:
    desc: Install server dependencies only
    cmds:
      - task: server:install

  install:cli:
    desc: Install CLI dependencies only
    cmds:
      - task: cli:install

  install:dashboard:
    desc: Install dashboard dependencies only
    cmds:
      - task: dashboard:install

  install:global:
    desc: Install all packages globally as CLI tools (using pip editable)
    cmds:
      - task: server:install:global
      - task: cli:install:global

  install:from-source:
    desc: >-
      Reinstall CLI+server+dashboard from the `stable` branch (its current tip,
      built in an isolated worktree — your checked-out branch is untouched) over
      the pipx install, auto-stopping running servers + dashboard and restoring
      them exactly as before. Override the ref with BRAINPALACE_INSTALL_REF=<branch>.
      Flags: -- --dry-run (plan only), -- --no-restart (leave stopped).
    cmds:
      - bash scripts/dev-install-from-source.sh {{.CLI_ARGS}}

  # ===================
  # Development
  # ===================

  dev:
    desc: Start development server with hot reload
    cmds:
      - task: server:dev

  run:
    desc: Start production server
    cmds:
      - task: server:run

  # ===================
  # Build & Package
  # ===================

  build:
    desc: Build all packages
    cmds:
      - task: server:build
      - task: cli:build

  build:dashboard-ui:
    desc: Build the dashboard SPA into brainpalace_dashboard/static/
    dir: ./brainpalace-dashboard/frontend
    cmds:
      - npm ci
      - npm run build

  package:
    desc: Create distributable packages
    cmds:
      - task: server:package
      - task: cli:package

  clean:
    desc: Clean all build artifacts
    cmds:
      - task: server:clean
      - task: cli:clean
      - rm -rf .pytest_cache .mypy_cache .ruff_cache

  # ===================
  # Testing
  # ===================

  test:
    desc: Run all tests
    cmds:
      - task: server:test
      - task: cli:test
      - task: dashboard:test

  eval:
    desc: >-
      Run the retrieval eval harness (recall@k + MRR vs baseline). Directional,
      NOT part of pr-qa-gate; needs OPENAI_API_KEY. See docs/EVALUATION.md.
    cmds:
      - task: server:eval

  test:server:
    desc: Run server tests only
    cmds:
      - task: server:test

  test:cli:
    desc: Run CLI tests only
    cmds:
      - task: cli:test

  test:dashboard:
    desc: Run dashboard tests only (excludes integration tests)
    cmds:
      - task: dashboard:test

  test:cov:
    desc: Run tests with coverage report
    aliases: [coverage]
    cmds:
      - task: server:test:cov
      - task: cli:test:cov

  # ===================
  # Code Quality
  # ===================

  format:
    desc: Format all code with Black
    cmds:
      - task: server:format
      - task: cli:format
      - task: dashboard:format

  format:check:
    desc: Check formatting without modifying files
    cmds:
      - task: server:format:check
      - task: cli:format:check
      - task: dashboard:format:check

  lint:
    desc: Lint all code with Ruff
    cmds:
      - task: server:lint
      - task: cli:lint
      - task: dashboard:lint

  lint:fix:
    desc: Lint and auto-fix issues
    cmds:
      - task: server:lint:fix
      - task: cli:lint:fix
      - task: dashboard:lint:fix

  lint:yaml:
    desc: Validate YAML frontmatter in plugin command files
    cmds:
      - python3 -c "import yaml" 2>/dev/null || pip install pyyaml --quiet
      - python3 scripts/lint_yaml_frontmatter.py brainpalace-plugin/

  lint:doc-freshness:
    desc: Fail if audited docs changed after their last_validated date
    cmds:
      - python3 scripts/check_doc_freshness.py

  lint:dashboard-parity:
    desc: "Fail if a config/CLI/endpoint is not surfaced in the dashboard"
    cmds:
      - task: dashboard:parity

  lint:config-parity:
    desc: "Fail if a config model field is missing from the CLI field registry or mis-roled"
    dir: ./{{.CLI_DIR}}
    cmds:
      - "{{.POETRY}} run python -m brainpalace_cli.config_parity"

  lint:changelog:
    desc: "Fail if an Unreleased/current-release changelog entry exceeds 3 sentences"
    cmds:
      - python3 scripts/check_changelog_style.py

  lint:ai-guidance-parity:
    desc: "Fail if SKILL.md / hooks / MCP drift from the single AI-guidance source"
    dir: ./{{.CLI_DIR}}
    cmds:
      - "{{.POETRY}} run python ../scripts/check_ai_guidance_parity.py"

  lint:doc-sync:
    desc: "Fail if interface docs (CLI surface) drift from live code"
    dir: ./{{.CLI_DIR}}
    cmds:
      - "{{.POETRY}} run python ../scripts/check_doc_sync.py --mode block"

  lint:doc-verify:
    desc: "Fail if doc prose (Layer B) was not verified for the current diff (marker gate; no model call)"
    dir: ./{{.CLI_DIR}}
    cmds:
      # Process gate ONLY: asserts the doc-verifier agent was run for THIS diff
      # (records a per-diff marker). Never calls a model, never gates on an LLM
      # verdict. Satisfy it in-session: `/brainpalace-verify-docs --changed`.
      - "{{.POETRY}} run brainpalace verify-docs --check"

  lint:docs-gates-ci:
    # NB: doc-freshness is intentionally NOT here. It is git-history based, but
    # CI only ever sees `main` — the squashed one-commit-per-release mirror (the
    # publish job on the release tag; pr-qa-gate on push/PR to main). On that
    # tree every doc's last content-change collapses to the release commit date
    # (>= its stable-side last_validated), so freshness false-positives there
    # regardless of fetch-depth. It runs where the real, non-squashed history
    # lives: `task before-push` on the local `stable` branch.
    desc: "Doc gates runnable with the server+cli env (ai-guidance, doc-sync)"
    cmds:
      - task: lint:ai-guidance-parity
      - task: lint:doc-sync

  typecheck:
    desc: Type check all code with mypy
    aliases: [mypy]
    cmds:
      - task: server:typecheck
      - task: cli:typecheck
      - task: dashboard:typecheck

  vet:
    desc: Perform all static analysis
    cmds:
      - task: lint
      - task: typecheck

  check:
    desc: Quick check (lint + typecheck, no tests)
    cmds:
      - task: lint
      - task: typecheck
      - task: lint:config-parity

  # ===================
  # Pre-Push Workflow
  # ===================

  before-push:
    desc: Run all checks before pushing (format, lint, typecheck, yaml, test)
    cmds:
      - echo "--- Checking formatting ---"
      - task: format:check
      - echo "--- Linting code ---"
      - task: lint
      - echo "--- Linting YAML frontmatter ---"
      - task: lint:yaml
      - echo "--- Checking doc freshness ---"
      - task: lint:doc-freshness
      - echo "--- Checking changelog style ---"
      - task: lint:changelog
      - echo "--- Checking dashboard parity ---"
      - task: lint:dashboard-parity
      - echo "--- Checking AI-guidance parity ---"
      - task: lint:ai-guidance-parity
      - echo "--- Checking interface doc-sync ---"
      - task: lint:doc-sync
      # NB: Layer B prose verification (lint:doc-verify) is intentionally NOT a
      # push gate. It is advisory + probabilistic + costs subscription, and Layer
      # A (doc-sync, above) already hard-gates every machine-owned fact (flags,
      # commands, modes, providers, MCP tools, endpoints). Prose drift is surfaced
      # on a WEEKLY cadence instead: the SessionStart reminder hook
      # (.claude/hooks/sessionstart-docverify-sweep.sh) offers a sweep at most once
      # a week. Run on demand any time: `task lint:doc-verify` / `/brainpalace-verify-docs`.
      - echo "--- Type checking ---"
      - task: typecheck
      - echo "--- Running tests with coverage ---"
      - task: test:cov
      # Rehearse the publish/PR-QA gate in its dashboard-absent env so a
      # dashboard-coupling that passes the gates above can't slip to CI unnoticed.
      - echo "--- Rehearsing dashboard-absent CI gate ---"
      - task: release:rehearse-ci
      - echo "--- All checks passed - Ready to push ---"

  release:rehearse-ci:
    # `before-push` is necessary but not sufficient: the publish workflow re-runs
    # the gate in a server+cli env with NO dashboard installed, where the dashboard
    # is unimportable and its venv is absent. Gates green locally have shipped
    # broken to CI for exactly this reason. This target reproduces that env on a
    # dev box (where the dashboard usually IS installed) two ways:
    #   - BRAINPALACE_DOCSYNC_NO_DASHBOARD forces the dashboard-absent path in the
    #     doc-sync introspection + wrapped dashboard-parity gate;
    #   - BRAINPALACE_BLOCK_DASHBOARD + PYTHONPATH load scripts/ci_rehearsal's
    #     sitecustomize, which makes `import brainpalace_dashboard` itself raise —
    #     catching NEW direct-import coupling, not just doc-sync.
    # Then it runs the same gates the publish job runs. Run it before cutting a
    # release (RELEASING.md step 8a).
    desc: "Reproduce the publish CI gate locally (dashboard-absent) before cutting a release"
    env:
      BRAINPALACE_DOCSYNC_NO_DASHBOARD: "1"
      BRAINPALACE_BLOCK_DASHBOARD: "1"
      PYTHONPATH: "{{.ROOT_DIR}}/scripts/ci_rehearsal"
    cmds:
      - echo "--- Rehearsing publish CI gate (dashboard absent + import-blocked) ---"
      - task: lint:docs-gates-ci
      # Server+cli only — the publish gate's scope. The dashboard is treated as
      # absent here, so its own suite is intentionally NOT run (it has its own
      # 3.12 job and is covered locally by `task before-push`).
      #
      # These MUST be inline `cmd:`s, not `- task: test:cli` refs: go-task does
      # NOT propagate this task's `env:` (PYTHONPATH + BRAINPALACE_BLOCK_DASHBOARD)
      # into a called task's pytest subprocess, so the import-blocker never
      # reached the tests — a CLI module that hard-imported `brainpalace_dashboard`
      # passed the rehearsal locally yet failed the real dashboard-absent CI gate.
      # Running pytest here applies this task's env directly to the subprocess.
      - cd brainpalace-server && env -u VIRTUAL_ENV poetry run pytest tests -q
      - cd brainpalace-cli && env -u VIRTUAL_ENV poetry run pytest tests -q
      - echo "--- CI rehearsal passed (dashboard-absent gate green) ---"

  release:prep:
    # One command for the LOCAL, reversible half of RELEASING.md (steps 3-8):
    # bump every version site, roll the changelog, reinstall so `--version`
    # reflects the bump, restamp any audited doc whose content changed this
    # release, then run the full release gate. Leaves ONLY the outward-facing,
    # irreversible half to a human: commit on stable, mirror to main, tag, and
    # create the GitHub Release (which publishes to PyPI) — steps 9-13.
    #
    # BRAINPALACE_RELEASE=1 for the whole task so `install` force-switches the
    # cli's siblings to LOCAL path deps (this release's server/dashboard aren't on
    # PyPI yet) and `before-push` is allowed by the beforepush guard.
    #
    # Usage:  task release:prep -- 26.7.2
    desc: "Prep a release locally: bump all version sites, roll changelog, reinstall, restamp changed docs, run the gate (usage: task release:prep -- 26.7.2)"
    env:
      BRAINPALACE_RELEASE: "1"
    vars:
      VERSION: "{{.CLI_ARGS}}"
    preconditions:
      - sh: 'test -n "{{.VERSION}}"'
        msg: "usage: task release:prep -- <YY.M.N>   (e.g. task release:prep -- 26.7.2)"
    cmds:
      - echo "--- Bumping version to {{.VERSION}} across all six sites ---"
      - python3 scripts/bump_version.py "{{.VERSION}}"
      - echo "--- Rolling CHANGELOG to {{.VERSION}} ---"
      - python3 scripts/roll_changelog.py "{{.VERSION}}"
      - echo "--- Reinstalling (local siblings) so --version reflects the bump ---"
      - task: install
      - echo "--- Restamping audited docs whose content changed this release ---"
      - |
        set -uo pipefail
        # NB: check_doc_freshness exits NON-ZERO precisely when docs are stale —
        # that is the signal we act on, not a failure. Capture its output and
        # swallow the status (|| true); do NOT `set -e` here or the release aborts
        # exactly when there is something to re-stamp.
        stale=$(python3 scripts/check_doc_freshness.py --json 2>/dev/null \
          | python3 -c "import sys,json;print('\n'.join(d['file'] for d in json.load(sys.stdin)['stale']))" || true)
        if [ -n "$stale" ]; then
          printf '%s\n' "$stale" | xargs python3 scripts/add_audit_metadata.py
          echo "restamped (releaser attests these are current as of this release):"
          printf '%s\n' "$stale" | sed 's/^/  /'
        else
          echo "no audited docs changed — nothing to restamp"
        fi
      - echo "--- Running the release gate (before-push, ~10 min) ---"
      - task: before-push
      - echo "=== release:prep complete for {{.VERSION}} ==="
      - echo "Next (HUMAN, outward-facing, irreversible) — commit the bump+changelog on stable, mirror to main, tag v{{.VERSION}}, then create the GitHub Release which publishes to PyPI. See docs/RELEASING.md steps 9-13."

  ci:
    desc: Simulate full CI pipeline locally
    cmds:
      - task: clean
      - task: install
      - task: lint
      - task: typecheck
      - task: test:cov
      - task: build

  pr-qa-gate:
    desc: PR quality gate - lint, yaml lint, typecheck, test with 50% coverage minimum
    cmds:
      - echo "--- Running PR QA Gate ---"
      - task: lint
      - task: lint:yaml
      - task: typecheck
      - task: server:pr-qa-gate
      - task: cli:pr-qa-gate
      - echo "--- PR QA Gate Passed ---"

  # ===================
  # Documentation
  # ===================

  docs:
    desc: Open API documentation in browser
    cmds:
      - open http://127.0.0.1:8000/docs || xdg-open http://127.0.0.1:8000/docs

  # ===================
  # CLI Commands (convenience wrappers)
  # ===================

  status:
    desc: Check server status via CLI (usage - task status -- --json)
    dir: ./{{.CLI_DIR}}
    cmds:
      - "{{.POETRY}} run brainpalace status {{.CLI_ARGS}}"

  query:
    desc: Query documents (usage - task query -- "your query")
    dir: ./{{.CLI_DIR}}
    cmds:
      - "{{.POETRY}} run brainpalace query {{.CLI_ARGS}}"

  index:
    desc: Index documents (usage - task index -- ./path/to/docs)
    vars:
      ABS_PATH:
        sh: 'echo "{{.CLI_ARGS}}" | head -1 | xargs -I{} realpath "{}" 2>/dev/null || echo "{{.CLI_ARGS}}"'
    dir: ./{{.CLI_DIR}}
    cmds:
      - "{{.POETRY}} run brainpalace index {{.ABS_PATH}}"

  reset:
    desc: Reset the index (usage - task reset -- --yes)
    dir: ./{{.CLI_DIR}}
    cmds:
      - "{{.POETRY}} run brainpalace reset {{.CLI_ARGS}}"

  # ===================
  # Integration Testing
  # ===================

  local-integration:
    desc: Run local integration check (E2E validation before release)
    cmds:
      - ./scripts/local_integration_check.sh

  quick-start:
    desc: Run quick start guide validation
    cmds:
      - ./scripts/quick_start_guide.sh

  e2e-cli:
    desc: Run CLI E2E tests (requires claude CLI and API keys)
    cmds:
      - ./e2e-cli/run.sh {{.CLI_ARGS}}

  test:e2e-dashboard:
    desc: >-
      Run the Playwright E2E suite for the control-plane dashboard. Builds the
      SPA, then drives a real dashboard + throwaway project server with headless
      Chromium. Requires OPENAI_API_KEY (the seeded project indexes/queries for
      real) and a one-time `npx playwright install chromium`.
    dir: ./e2e/dashboard
    env:
      PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
    cmds:
      - task: build:dashboard-ui
      - npm install
      - npx playwright test {{.CLI_ARGS}}
