name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature. Before filing:

        - Check the [Release History](https://github.com/bxw91/brainpalace#release-history) — the feature may already exist.
        - BrainPalace favors focused bug fixes and sane-default changes. Heavyweight new abstractions are evaluated case-by-case.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's the user-facing pain or capability gap? Concrete scenario beats abstract.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like brainpalace to do? Be concrete — example command, config knob, observed behaviour.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds tried, other tools that solve it, why those aren't enough.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which part of brainpalace would this touch?
      options:
        - CLI command / flag
        - Server endpoint or indexing behaviour
        - MCP tool addition or transport change
        - New embedding or summarisation provider
        - Claude Code plugin command / agent / skill
        - Docs improvement
        - Other
    validations:
      required: true
