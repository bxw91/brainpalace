# PR Quality Assurance Gate
# Runs on all pull requests to ensure code quality and test coverage
#
# Security: This workflow does not use any untrusted inputs in shell commands.
# All dynamic values (runner.os, hashFiles) are safe GitHub context values.

name: PR QA Gate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  # codecov-action's internal actions/github-script still has no node24 release
  # (arduino/setup-task is now @v3 = node24). Force remaining node20 JS actions
  # onto node24: GitHub flips this default ~2026-06-16, and node20 is removed
  # ~2026-09-16 — opting in now keeps these green through both dates.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  qa-gate:
    name: Quality Assurance Gate
    runs-on: ubuntu-latest
    environment: ci-testing

    # PostgreSQL service container with pgvector for contract + load tests
    # Tests marked @pytest.mark.postgres skip without DATABASE_URL locally
    # but run in CI with this service container providing the database
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: brainpalace_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Free up disk space
        run: |
          # Remove unnecessary tools to free up ~10GB
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Task
        uses: arduino/setup-task@v3
        with:
          version: 3.43.3

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.4.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache pip packages (PyTorch, CUDA, etc.)
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.11-${{ hashFiles('brainpalace-server/poetry.lock') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.11-
            pip-${{ runner.os }}-

      - name: Cache HuggingFace models (sentence-transformers)
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-sentence-transformers
          restore-keys: |
            hf-${{ runner.os }}-

      - name: Cache Poetry dependencies (server)
        uses: actions/cache@v5
        with:
          path: brainpalace-server/.venv
          key: server-venv-postgres-${{ runner.os }}-${{ hashFiles('brainpalace-server/poetry.lock') }}
          restore-keys: |
            server-venv-${{ runner.os }}-

      - name: Cache Poetry dependencies (cli)
        uses: actions/cache@v5
        with:
          path: brainpalace-cli/.venv
          key: cli-venv-${{ runner.os }}-${{ hashFiles('brainpalace-cli/poetry.lock') }}
          restore-keys: |
            cli-venv-${{ runner.os }}-

      - name: Build server package first (CLI depends on it)
        run: |
          cd brainpalace-server
          poetry build
          echo "Built server package:"
          ls -la dist/

      - name: Install server from local build
        run: |
          cd brainpalace-server
          poetry install --extras postgres

      - name: Install CLI with local server dependency
        run: |
          cd brainpalace-cli
          # Neither sibling resolves from PyPI in CI for an in-progress version,
          # so point both at the worktree by path before locking. The dashboard
          # is a regular (python>=3.12) dependency, not an extra — without the
          # swap a fresh `poetry lock` fails version-solving on it.
          sed -i 's|brainpalace-rag = "^[0-9]*\.[0-9]*\.[0-9]*"|brainpalace-rag = {path = "../brainpalace-server", develop = false}|' pyproject.toml
          sed -i 's|brainpalace-dashboard = { version = "^[0-9]*\.[0-9]*\.[0-9]*", python = ">=3.12" }|brainpalace-dashboard = { path = "../brainpalace-dashboard", develop = false, python = ">=3.12" }|' pyproject.toml
          poetry lock
          poetry install
          # Restore PyPI dependencies for consistency
          git checkout pyproject.toml

      # Scope to the two packages this job installs. Root `task lint` /
      # `task typecheck` also fan out to the dashboard, whose dev tools live in
      # its own Python 3.12 venv that this job never installs.
      - name: Run linting
        run: task server:lint cli:lint

      - name: Lint YAML frontmatter in plugin files
        run: |
          pip install pyyaml --quiet
          task lint:yaml

      - name: Run type checking
        run: task server:typecheck cli:typecheck

      - name: Run doc-sync + parity gates
        env:
          PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
        run: task lint:docs-gates-ci

      # Zero-dependency AST scan (stdlib only — no brainpalace-life venv
      # needed), so it runs cheaply in this 3.11 server+cli-only job on every
      # PR. brainpalace-life's own tests run in the dashboard-gate job below
      # (3.12), where the package is actually installed.
      - name: Run import-boundary gate (brainpalace-life)
        run: task lint:import-boundary

      - name: Check server/CLI version alignment
        run: |
          SERVER_VERSION=$(grep '^version = ' brainpalace-server/pyproject.toml | cut -d'"' -f2)
          CLI_VERSION=$(grep '^version = ' brainpalace-cli/pyproject.toml | cut -d'"' -f2)

          echo "Server version: $SERVER_VERSION"
          echo "CLI version: $CLI_VERSION"

          if [ "$SERVER_VERSION" != "$CLI_VERSION" ]; then
            echo "ERROR: Server and CLI versions must match"
            echo "Server: $SERVER_VERSION, CLI: $CLI_VERSION"
            exit 1
          fi
          echo "✓ Versions aligned: $SERVER_VERSION"

      - name: Run tests with coverage (Server)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/brainpalace_test
        run: task server:pr-qa-gate

      - name: Run tests with coverage (CLI)
        run: task cli:pr-qa-gate

      - name: Upload coverage reports
        uses: codecov/codecov-action@v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: brainpalace-server/coverage-server.xml,brainpalace-cli/coverage-cli.xml
          fail_ci_if_error: false
          verbose: true

  dashboard-gate:
    name: Dashboard Gate
    runs-on: ubuntu-latest

    # The qa-gate job runs in a 3.11 server+cli env without the dashboard, so its
    # doc-sync skips /dashboard checks and its wrapped dashboard-parity is skipped.
    # This job installs all three packages (PLUS the brainpalace-life product
    # subpackage, also python ^3.12, via `task install`'s `life:install` fan-out)
    # in a Python 3.12 env (the dashboard's required version) and runs the FULL
    # doc-sync + dashboard-parity gates, so dashboard doc/route/config drift is
    # caught on PRs instead of only locally.
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Task
        uses: arduino/setup-task@v3
        with:
          version: 3.43.3

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.4.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install (server + cli + dashboard + life)
        env:
          PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
        run: task install

      - name: Run brainpalace-life tests
        env:
          PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
        run: task life:test

      - name: Full doc-sync + dashboard parity (dashboard present)
        env:
          PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
        run: |
          task lint:doc-sync
          task lint:dashboard-parity
