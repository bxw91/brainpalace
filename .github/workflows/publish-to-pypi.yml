# Publish to PyPI on Release
# Triggered when a new release is published on GitHub
#
# Security: Uses PyPI Trusted Publisher (OIDC) authentication - no API tokens needed
# Packages are published sequentially: server first, then CLI (depends on server for PyPI resolution)

name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # Required for OIDC authentication with PyPI

env:
  # Force node20 JS actions (e.g. arduino/setup-task@v2) onto node24 — they
  # have no node24 release. Survives the 2026-06-16 default flip + 2026-09-16
  # node20 removal.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest

    # This release's server/dashboard are not on PyPI yet (they publish later in
    # THIS run), so every `task install` — including the one `cli:test` triggers
    # via its `deps: [install]` — must build the cli venv against LOCAL sibling
    # source, not the previous published version. Without this the installed
    # server is one release behind and the query-mode guard/parity gate fails.
    env:
      BRAINPALACE_RELEASE: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.43.3

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.4.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies (server)
        uses: actions/cache@v5
        with:
          path: brainpalace-server/.venv
          key: server-venv-${{ runner.os }}-${{ hashFiles('brainpalace-server/poetry.lock') }}
          restore-keys: |
            server-venv-${{ runner.os }}-

      - name: Cache Poetry dependencies (cli)
        uses: actions/cache@v5
        with:
          path: brainpalace-cli/.venv
          key: cli-venv-${{ runner.os }}-${{ hashFiles('brainpalace-cli/poetry.lock') }}
          restore-keys: |
            cli-venv-${{ runner.os }}-

      - name: Build server package first (CLI depends on it)
        run: |
          cd brainpalace-server
          poetry build
          echo "Built server package:"
          ls -la dist/

      - name: Install server from local build
        run: |
          cd brainpalace-server
          poetry install

      - name: Install CLI with local server dependency
        run: |
          cd brainpalace-cli
          # Neither sibling is on PyPI yet at gate time (both publish later in
          # this run), so a fresh `poetry lock` can't resolve their version
          # constraints. Temporarily point both at the worktree by path — the
          # optional dashboard extra would otherwise fail version solving on the
          # not-yet-published brainpalace-dashboard.
          sed -i 's|brainpalace-rag = "^[0-9]*\.[0-9]*\.[0-9]*"|brainpalace-rag = {path = "../brainpalace-server", develop = false}|' pyproject.toml
          sed -i 's|brainpalace-dashboard = { version = "^[0-9]*\.[0-9]*\.[0-9]*", python = ">=3.12" }|brainpalace-dashboard = { path = "../brainpalace-dashboard", develop = false, python = ">=3.12" }|' pyproject.toml
          poetry lock
          poetry install
          # Restore PyPI dependencies for consistency
          git checkout pyproject.toml

      # Lint/typecheck the two packages this gate installs. The root `task lint`
      # / `task typecheck` also fan out to the dashboard, whose dev tools live in
      # its own (Python 3.12) venv that this 3.11 job never installs — so scope
      # to server+cli here. The dashboard is validated by the `dashboard-gate` job
      # below (3.12, full doc-sync + parity) and locally by `task before-push`.
      # `task test` is already server+cli only.
      - name: Run linting
        run: task server:lint cli:lint

      - name: Run type checking
        run: task server:typecheck cli:typecheck

      - name: Run doc-sync + parity gates
        env:
          PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
        run: task lint:docs-gates-ci

      # Zero-dependency AST scan (stdlib only — no brainpalace-life venv
      # needed), so it runs cheaply in this 3.11 server+cli-only job on every
      # release. brainpalace-life's own tests run in the dashboard-gate job
      # below (3.12), where the package is actually installed.
      - name: Run import-boundary gate (brainpalace-life)
        run: task lint:import-boundary

      - name: Run tests
        run: task test

  dashboard-gate:
    name: Dashboard Gate
    runs-on: ubuntu-latest

    # Same reason as quality-gate: force `task install` to build against LOCAL
    # sibling source so the cli venv carries THIS release's server (not the
    # previous published one), or the doc-sync query-mode guard fails on drift.
    env:
      BRAINPALACE_RELEASE: "1"

    # The quality-gate job above runs in a 3.11 server+cli env where the dashboard
    # is NOT installed, so its doc-sync run skips /dashboard checks and its wrapped
    # dashboard-parity is skipped. This job installs all three packages (PLUS the
    # brainpalace-life product subpackage, also python ^3.12, via `task install`'s
    # `life:install` fan-out) in a Python 3.12 env and runs the FULL doc-sync +
    # dashboard-parity gates, so dashboard doc/route/config drift is validated in
    # CI rather than only by a maintainer's local `task before-push`.
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.43.3

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.4.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install (server + cli + dashboard + life)
        env:
          PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
        run: task install

      - name: Run brainpalace-life tests
        env:
          PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
        run: task life:test

      - name: Full doc-sync + dashboard parity (dashboard present)
        env:
          PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
        run: |
          task lint:doc-sync
          task lint:dashboard-parity

  publish-server:
    name: Publish brainpalace-rag
    needs: [quality-gate, dashboard-gate]
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Verify tag matches pyproject.toml version
        run: |
          # Get version from release tag (e.g., v3.0.0 → 3.0.0)
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          # Get version from pyproject.toml
          SERVER_VERSION=$(grep '^version = ' brainpalace-server/pyproject.toml | cut -d'"' -f2)
          CLI_VERSION=$(grep '^version = ' brainpalace-cli/pyproject.toml | cut -d'"' -f2)
          DASHBOARD_VERSION=$(grep '^version = ' brainpalace-dashboard/pyproject.toml | cut -d'"' -f2)

          echo "Tag version: $TAG_VERSION"
          echo "Server pyproject.toml: $SERVER_VERSION"
          echo "CLI pyproject.toml: $CLI_VERSION"
          echo "Dashboard pyproject.toml: $DASHBOARD_VERSION"

          # Verify all versions match
          if [ "$TAG_VERSION" != "$SERVER_VERSION" ]; then
            echo "ERROR: Tag ($TAG_VERSION) does not match server version ($SERVER_VERSION)"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$CLI_VERSION" ]; then
            echo "ERROR: Tag ($TAG_VERSION) does not match CLI version ($CLI_VERSION)"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$DASHBOARD_VERSION" ]; then
            echo "ERROR: Tag ($TAG_VERSION) does not match dashboard version ($DASHBOARD_VERSION)"
            exit 1
          fi

          echo "✓ All versions aligned: $TAG_VERSION"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.4.1

      - name: Build package
        run: poetry build
        working-directory: brainpalace-server

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: brainpalace-server/dist/

  publish-cli:
    name: Publish brainpalace-cli
    needs: [quality-gate, publish-server]
    runs-on: ubuntu-latest
    environment: pypi-cli

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Wait for server package on PyPI
        run: |
          # Get version from release tag (e.g., v3.0.0 → 3.0.0)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Waiting for brainpalace-rag==$VERSION on PyPI..."
          for i in {1..30}; do
            if curl -sf "https://pypi.org/pypi/brainpalace-rag/$VERSION/json" > /dev/null; then
              echo "✓ Found brainpalace-rag==$VERSION on PyPI"
              exit 0
            fi
            echo "Attempt $i/30: Not yet available, waiting 10s..."
            sleep 10
          done
          echo "✗ Timeout waiting for PyPI propagation"
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.4.1

      - name: Vendor canonical plugin into the CLI package
        # data/plugin/ is gitignored generated output (like the dashboard's
        # built static/). Vendor it from brainpalace-plugin/ here so `poetry
        # build` below force-packages it into the wheel — this is what makes
        # `install-agent` work on a standalone `pipx install brainpalace`.
        run: python3 scripts/vendor_plugin.py

      - name: Build package
        run: poetry build
        working-directory: brainpalace-cli

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: brainpalace-cli/dist/

  publish-dashboard:
    name: Publish brainpalace-dashboard
    needs: [quality-gate, publish-server, publish-cli]
    runs-on: ubuntu-latest
    environment: pypi-dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Wait for CLI package on PyPI
        run: |
          # Get version from release tag (e.g., v3.0.0 → 3.0.0)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Waiting for brainpalace-cli==$VERSION on PyPI..."
          for i in {1..30}; do
            if curl -sf "https://pypi.org/pypi/brainpalace-cli/$VERSION/json" > /dev/null; then
              echo "✓ Found brainpalace-cli==$VERSION on PyPI"
              exit 0
            fi
            echo "Attempt $i/30: Not yet available, waiting 10s..."
            sleep 10
          done
          echo "✗ Timeout waiting for PyPI propagation"
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.4.1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dashboard SPA
        # static/ is gitignored generated output (no longer committed). Build it
        # from frontend source here so `poetry build` below packages a fresh SPA
        # into the wheel/sdist (forced in via pyproject `include`). End users then
        # `pip install` a prebuilt SPA with no node toolchain. Mirrors the local
        # `task build:dashboard-ui` and dev-install-from-source.sh rebuild.
        working-directory: brainpalace-dashboard/frontend
        run: |
          npm ci
          npm run build

      - name: Pin brainpalace-cli to the released version
        run: |
          # In source the dashboard depends on the CLI by path (develop install
          # for the worktree). For the PyPI build, swap that path dependency for
          # a CARET range on the just-published version so the wheel resolves
          # brainpalace-cli (and its server/extra deps) from PyPI. Mirrors the
          # server↔cli path trick used in the quality-gate job.
          #
          # IMPORTANT: emit "^$VERSION", not a bare "$VERSION" (which Poetry reads
          # as an EXACT ==pin). An exact pin makes every downstream resolver (pip
          # on `brainpalace update`, and `poetry update --lock`) backtrack: cli
          # depends on dashboard "^26.5.1", so the resolver tries dashboard
          # candidates and each older one demands a different exact cli, forcing a
          # wheel download + conflict + backtrack. A caret (>=$VERSION,<next-year)
          # mirrors cli's own "^" dep on dashboard and resolves in one shot.
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s|brainpalace-cli = { path = \"../brainpalace-cli\", develop = true }|brainpalace-cli = \"^$VERSION\"|" brainpalace-dashboard/pyproject.toml
          echo "Dashboard CLI dependency line after pin:"
          grep 'brainpalace-cli' brainpalace-dashboard/pyproject.toml

      - name: Build package
        run: poetry build
        working-directory: brainpalace-dashboard

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: brainpalace-dashboard/dist/
