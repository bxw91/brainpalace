# BrainPalace CLI Task Runner
# https://taskfile.dev

version: '3'

vars:
  PROJECT_NAME: brainpalace-cli
  SRC_DIR: brainpalace_cli
  TEST_DIR: tests
  # `poetry` wrapped to strip an IDE-injected VIRTUAL_ENV (e.g. the VSCode
  # Python extension exporting a non-project path), so Poetry always resolves
  # the in-project .venv/. Use {{.POETRY}} for every Poetry call.
  POETRY: env -u VIRTUAL_ENV poetry

env:
  PYTHONPATH: './brainpalace_cli:./tests'
  BRAINPALACE_URL: '{{default "http://127.0.0.1:8000" .BRAINPALACE_URL}}'

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list

  # ===================
  # Setup
  # ===================

  install:
    desc: Install project dependencies (incl. the dashboard on Python 3.12+)
    cmds:
    - |
      # Monorepo: brainpalace-rag and brainpalace-dashboard live in this repo but
      # the committed pyproject pins them by PyPI version (for end-user installs).
      # The inner loop installs those published siblings (fast). Two cases need
      # the LOCAL sibling source instead, both handled by switching to path deps,
      # re-locking, and installing:
      #   1. Release gate (BRAINPALACE_RELEASE=1): the NEW version's siblings are
      #      not on PyPI yet, but the previous version IS — so a plain install
      #      succeeds against the OLD published sibling. The dogfood / doc-sync
      #      tests reflect docs against the LIVE installed server+dashboard, so a
      #      newly added endpoint / module / config field reads as false drift and
      #      the gate fails. Forcing local source makes the gate test THIS release.
      #   2. Siblings genuinely absent from PyPI (early dev): plain install fails.
      # Case 1 also restores poetry.lock so the committed lock stays PyPI-pinned
      # (RELEASING.md step 12 refreshes it after publish); case 2 leaves the
      # path-lock (nothing is published to pin yet). The dashboard path dep is
      # marked develop=true; the resulting cycle (dashboard -> cli) is fine for
      # Poetry path deps.
      restore_lock=0
      if [ "${BRAINPALACE_RELEASE:-}" = "1" ]; then
        need_path=1; restore_lock=1
      elif {{.POETRY}} install 2>/dev/null; then
        need_path=0
      else
        need_path=1
      fi
      if [ "$need_path" = "1" ]; then
        cp pyproject.toml pyproject.toml.bak
        [ "$restore_lock" = "1" ] && cp poetry.lock poetry.lock.bak
        perl -pi -e 's|brainpalace-rag = "\^[0-9]+\.[0-9]+\.[0-9]+"|brainpalace-rag = {path = "../brainpalace-server", develop = false}|' pyproject.toml
        perl -pi -e 's|brainpalace-dashboard = \{ version = "\^[0-9]+\.[0-9]+\.[0-9]+", python = ">=3.12" \}|brainpalace-dashboard = {path = "../brainpalace-dashboard", develop = true, python = ">=3.12"}|' pyproject.toml
        {{.POETRY}} lock
        {{.POETRY}} install
        mv pyproject.toml.bak pyproject.toml
        [ "$restore_lock" = "1" ] && mv poetry.lock.bak poetry.lock
      fi

  install:global:
    desc: Install as a global CLI tool (editable mode)
    cmds:
    - pip install -e .

  # ===================
  # CLI Commands
  # ===================

  status:
    desc: Check server status (usage - task status -- --json)
    deps: [install]
    cmds:
      - "{{.POETRY}} run brainpalace status {{.CLI_ARGS}}"

  query:
    desc: Query documents (usage - task query -- "your query")
    deps: [install]
    cmds:
      - '{{.POETRY}} run brainpalace query "{{.CLI_ARGS}}"'

  index:
    desc: Index documents (usage - task index -- /path/to/docs)
    deps: [install]
    cmds:
      - "{{.POETRY}} run brainpalace index {{.CLI_ARGS}}"

  reset:
    desc: Reset the index (usage - task reset -- --yes)
    deps: [install]
    cmds:
      - "{{.POETRY}} run brainpalace reset {{.CLI_ARGS}}"

  # ===================
  # Build & Package
  # ===================

  clean:
    desc: Remove build artifacts and temporary files
    cmds:
      - rm -rf dist build *.egg-info
      - rm -rf .pytest_cache .mypy_cache .ruff_cache
      - rm -rf htmlcov .coverage coverage.xml
      - find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

  vendor-plugin:
    desc: >-
      Vendor the canonical plugin into brainpalace_cli/data/plugin/ so the wheel
      can ship it (gitignored generated output). Required for `install-agent` to
      work on a standalone install with no repo checkout.
    cmds:
      - python3 ../scripts/vendor_plugin.py

  build:
    desc: Build the package
    deps: [clean, vendor-plugin]
    cmds:
      - "{{.POETRY}} build"

  package:
    desc: Create distributable package
    deps: [build, test]
    cmds:
      - "{{.POETRY}} build"

  # ===================
  # Testing
  # ===================

  test:
    desc: Run unit tests
    deps: [install]
    cmds:
      - "{{.POETRY}} run pytest {{.TEST_DIR}} -v"

  test:cov:
    desc: Run tests with coverage report
    aliases: [coverage]
    deps: [install]
    cmds:
      - "{{.POETRY}} run pytest {{.TEST_DIR}} --cov={{.SRC_DIR}} --cov-report=term-missing --cov-report=html"

  # ===================
  # Code Quality
  # ===================

  format:
    desc: Auto-format code with Black
    cmds:
      - "{{.POETRY}} run black {{.SRC_DIR}} {{.TEST_DIR}}"

  format:check:
    desc: Check code formatting without changes
    cmds:
      - "{{.POETRY}} run black --check {{.SRC_DIR}} {{.TEST_DIR}}"

  lint:
    desc: Check code for style violations with Ruff
    cmds:
      - "{{.POETRY}} run ruff check {{.SRC_DIR}} {{.TEST_DIR}}"

  lint:fix:
    desc: Lint and auto-fix issues
    cmds:
      - "{{.POETRY}} run ruff check --fix {{.SRC_DIR}} {{.TEST_DIR}}"

  typecheck:
    desc: Type check with mypy
    aliases: [mypy]
    cmds:
      - "{{.POETRY}} run mypy {{.SRC_DIR}}"

  vet:
    desc: Perform all static analysis (lint + typecheck)
    cmds:
      - task: lint
      - task: typecheck

  # ===================
  # Combined Tasks
  # ===================

  check:
    desc: Run all quality checks without tests
    cmds:
      - task: format:check
      - task: lint
      - task: typecheck

  all:
    desc: Format, lint, typecheck, and test
    cmds:
      - task: format
      - task: lint
      - task: typecheck
      - task: test

  ci:
    desc: Simulate full CI pipeline locally
    cmds:
      - task: clean
      - task: install
      - task: lint
      - task: typecheck
      - task: test:cov
      - task: build

  pr-qa-gate:
    desc: PR quality gate with 50% coverage minimum
    cmds:
      - "{{.POETRY}} run pytest {{.TEST_DIR}} --cov={{.SRC_DIR}} --cov-report=term-missing --cov-report=xml:coverage-cli.xml --cov-fail-under=50"
